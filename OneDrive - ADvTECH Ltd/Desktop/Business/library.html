<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OpenShelf — Online Library</title>
  <!-- Tailwind CDN for quick styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* small custom styles */
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .glass { background: rgba(255,255,255,0.6); backdrop-filter: blur(6px); }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">
  <header class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-6">
    <div class="max-w-6xl mx-auto flex items-center gap-4">
      <h1 class="text-2xl font-semibold">OpenShelf</h1>
      <p class="opacity-80">A lightweight online library demo — search, filter, preview books</p>
      <div class="ml-auto flex items-center gap-2">
        <input id="search" type="search" placeholder="Search by title, author or keyword" class="px-3 py-2 rounded-md text-black w-72" />
        <select id="categoryFilter" class="px-3 py-2 rounded-md text-black">
          <option value="all">All categories</option>
        </select>
        <button id="importBtn" class="px-3 py-2 bg-white text-indigo-600 rounded-md">Import</button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
    <!-- sidebar -->
    <aside class="lg:col-span-1 glass rounded-2xl p-4 shadow">
      <h2 class="font-semibold text-lg">Filters</h2>
      <div class="mt-3">
        <label class="block text-sm">Category</label>
        <div id="categoryList" class="flex flex-wrap gap-2 mt-2"></div>
      </div>
      <div class="mt-4">
        <label class="block text-sm">Sort</label>
        <select id="sort" class="mt-2 px-3 py-2 rounded-md text-black w-full">
          <option value="title_asc">Title A → Z</option>
          <option value="title_desc">Title Z → A</option>
          <option value="author_asc">Author A → Z</option>
        </select>
      </div>
      <div class="mt-6">
        <h3 class="font-medium">Add a book (quick)</h3>
        <p class="text-xs text-gray-600">Add a book record that links to an online file or page.</p>
        <form id="addForm" class="mt-2 space-y-2">
          <input id="bTitle" placeholder="Title" class="w-full px-3 py-2 rounded-md" required />
          <input id="bAuthor" placeholder="Author" class="w-full px-3 py-2 rounded-md" />
          <input id="bCategory" placeholder="Category" class="w-full px-3 py-2 rounded-md" />
          <input id="bURL" placeholder="URL to book (PDF / HTML)" class="w-full px-3 py-2 rounded-md" />
          <button type="submit" class="w-full px-3 py-2 bg-indigo-600 text-white rounded-md">Add Book</button>
        </form>
      </div>
    </aside>

    <!-- content -->
    <section class="lg:col-span-3">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-semibold">Catalog</h2>
        <div class="text-sm text-gray-600">Showing <span id="count">0</span> books</div>
      </div>

      <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>

      <div class="mt-6 flex justify-center">
        <button id="prev" class="px-4 py-2 rounded-md bg-white shadow">Prev</button>
        <div class="px-4 py-2">Page <span id="page">1</span></div>
        <button id="next" class="px-4 py-2 rounded-md bg-white shadow">Next</button>
      </div>
    </section>
  </main>

  <!-- modal -->
  <div id="modal" class="fixed inset-0 hidden items-center justify-center bg-black bg-opacity-40 p-6">
    <div class="bg-white rounded-2xl w-full max-w-4xl shadow-lg overflow-hidden">
      <div class="flex items-start gap-4 p-4 border-b">
        <img id="modalCover" src="" alt="cover" class="w-24 h-32 object-cover rounded" />
        <div>
          <h3 id="modalTitle" class="text-xl font-semibold"></h3>
          <div id="modalAuthor" class="text-sm text-gray-600 mt-1"></div>
          <p id="modalCat" class="text-xs text-gray-500 mt-2"></p>
        </div>
        <button id="modalClose" class="ml-auto text-gray-500">Close ✕</button>
      </div>
      <div id="modalBody" class="p-4 grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="md:col-span-1">
          <p id="modalDesc" class="text-sm text-gray-700"></p>
          <div class="mt-4">
            <a id="openLink" target="_blank" class="inline-block px-4 py-2 rounded-md bg-indigo-600 text-white">Open Book</a>
          </div>
        </div>
        <div class="md:col-span-2">
          <iframe id="viewer" src="" class="w-full h-96 border rounded"></iframe>
        </div>
      </div>
    </div>
  </div>

  <footer class="max-w-6xl mx-auto p-6 text-center text-sm text-gray-500">Built with ♥ — Replace the sample data with your own catalog. Open-source demo.</footer>

  <script>
    // ====== Sample dataset ======
    const BOOKS = [
      {
        id: 1,
        title: "Pride and Prejudice",
        author: "Jane Austen",
        category: "Classic",
        cover: "https://picsum.photos/seed/pride/200/300",
        url: "https://www.gutenberg.org/ebooks/1342.pdf.images",
        desc: "A classic novel about manners, marriage and society in early 19th-century England."
      },
      {
        id: 2,
        title: "Alice's Adventures in Wonderland",
        author: "Lewis Carroll",
        category: "Children",
        cover: "https://picsum.photos/seed/alice/200/300",
        url: "https://www.gutenberg.org/files/11/11-h/11-h.htm",
        desc: "A curious girl's adventures in a whimsical world."
      },
      {
        id: 3,
        title: "Frankenstein",
        author: "Mary Shelley",
        category: "Horror",
        cover: "https://picsum.photos/seed/frank/200/300",
        url: "https://www.gutenberg.org/ebooks/84.pdf.images",
        desc: "A gothic tale exploring creation, responsibility and isolation."
      },
      {
        id: 4,
        title: "The Adventures of Sherlock Holmes",
        author: "Arthur Conan Doyle",
        category: "Mystery",
        cover: "https://picsum.photos/seed/sherlock/200/300",
        url: "https://www.gutenberg.org/files/1661/1661-h/1661-h.htm",
        desc: "A collection of detective stories featuring the famous Sherlock Holmes."
      },
      {
        id: 5,
        title: "Meditations",
        author: "Marcus Aurelius",
        category: "Philosophy",
        cover: "https://picsum.photos/seed/med/200/300",
        url: "https://www.gutenberg.org/ebooks/2680.txt.utf-8",
        desc: "Stoic reflections by the Roman emperor."
      },
      {
        id: 6,
        title: "A Tale of Two Cities",
        author: "Charles Dickens",
        category: "Historical",
        cover: "https://picsum.photos/seed/tale/200/300",
        url: "https://www.gutenberg.org/files/98/98-h/98-h.htm",
        desc: "A story set in London and Paris before and during the French Revolution."
      },
      {
        id: 7,
        title: "The Secret Garden",
        author: "Frances Hodgson Burnett",
        category: "Children",
        cover: "https://picsum.photos/seed/garden/200/300",
        url: "https://www.gutenberg.org/files/17396/17396-h/17396-h.htm",
        desc: "A children's novel about rejuvenation and friendship."
      },
      {
        id: 8,
        title: "The War of the Worlds",
        author: "H. G. Wells",
        category: "Science Fiction",
        cover: "https://picsum.photos/seed/war/200/300",
        url: "https://www.gutenberg.org/files/36/36-h/36-h.htm",
        desc: "An early science fiction tale of Martian invasion."
      }
    ];

    // ====== State ======
    let state = {
      books: [...BOOKS],
      page: 1,
      pageSize: 6,
      search: '',
      category: 'all',
      sort: 'title_asc'
    };

    // ====== Helpers ======
    function $(sel){ return document.querySelector(sel); }
    function $all(sel){ return document.querySelectorAll(sel); }

    // ====== Render ======
    function render() {
      const grid = $('#grid');
      let list = [...state.books];

      // search
      const s = state.search.trim().toLowerCase();
      if (s) {
        list = list.filter(b => (b.title + ' ' + b.author + ' ' + (b.desc||'')).toLowerCase().includes(s));
      }
      // category
      if (state.category !== 'all') list = list.filter(b => b.category === state.category);

      // sort
      if (state.sort === 'title_asc') list.sort((a,b)=> a.title.localeCompare(b.title));
      if (state.sort === 'title_desc') list.sort((a,b)=> b.title.localeCompare(a.title));
      if (state.sort === 'author_asc') list.sort((a,b)=> a.author.localeCompare(b.author));

      // pagination
      const total = list.length;
      const pages = Math.max(1, Math.ceil(total / state.pageSize));
      if (state.page > pages) state.page = pages;
      const start = (state.page -1) * state.pageSize;
      const pageItems = list.slice(start, start + state.pageSize);

      grid.innerHTML = pageItems.map(b => `
        <article class="bg-white rounded-xl shadow p-3 flex flex-col">
          <img src="${b.cover}" alt="${escapeHtml(b.title)} cover" class="w-full h-44 object-cover rounded-md" />
          <h3 class="mt-3 font-semibold">${escapeHtml(b.title)}</h3>
          <div class="text-sm text-gray-600">${escapeHtml(b.author)}</div>
          <p class="mt-2 text-sm text-gray-700 line-clamp-3">${escapeHtml(b.desc || '')}</p>
          <div class="mt-3 flex gap-2">
            <button data-id="${b.id}" class="openBtn px-3 py-1 rounded bg-indigo-600 text-white">View</button>
            <a href="${b.url}" target="_blank" class="px-3 py-1 rounded bg-gray-200">Open</a>
          </div>
        </article>
      `).join('') || '<div class="text-center text-gray-500 p-8 col-span-full">No books found</div>';

      $('#count').textContent = total;
      $('#page').textContent = state.page;

      // wire view buttons
      $all('.openBtn').forEach(btn=> btn.addEventListener('click', (e)=> openModal(btn.dataset.id)) );
    }

    function escapeHtml(s){ return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;'); }

    // ====== Modal ======
    function openModal(id){
      const b = state.books.find(x=>x.id==id);
      if(!b) return;
      $('#modalTitle').textContent = b.title;
      $('#modalAuthor').textContent = b.author;
      $('#modalCat').textContent = b.category;
      $('#modalDesc').textContent = b.desc || '';
      $('#modalCover').src = b.cover;
      $('#openLink').href = b.url;

      // if link is an HTML/HTM or PDF, try to embed
      const viewer = $('#viewer');
      if (b.url && (b.url.endsWith('.pdf') || b.url.includes('gutenberg.org')) ) {
        viewer.src = b.url;
      } else {
        // fallback: load the url in the iframe if same-origin allows, otherwise blank
        viewer.src = b.url;
      }

      $('#modal').classList.remove('hidden');
      $('#modal').classList.add('flex');
    }
    function closeModal(){
      $('#modal').classList.add('hidden');
      $('#modal').classList.remove('flex');
      $('#viewer').src = '';
    }

    // ====== Init categories & UI wiring ======
    function init(){
      // categories
      const cats = Array.from(new Set(state.books.map(b=>b.category))).sort();
      const catSelect = $('#categoryFilter');
      cats.forEach(c=>{
        const opt = document.createElement('option'); opt.value=c; opt.textContent=c; catSelect.appendChild(opt);
      });
      const catList = $('#categoryList');
      cats.forEach(c=>{
        const btn = document.createElement('button'); btn.className='px-2 py-1 rounded-md border text-sm'; btn.textContent = c; btn.addEventListener('click', ()=>{ state.category = c; render(); });
        catList.appendChild(btn);
      });

      // search
      $('#search').addEventListener('input', (e)=>{ state.search = e.target.value; state.page = 1; render(); });
      $('#sort').addEventListener('change', (e)=>{ state.sort = e.target.value; render(); });
      $('#categoryFilter').addEventListener('change', (e)=>{ state.category = e.target.value; render(); });

      // pagination
      $('#prev').addEventListener('click', ()=>{ if (state.page>1) state.page--; render(); });
      $('#next').addEventListener('click', ()=>{ state.page++; render(); });

      // modal
      $('#modalClose').addEventListener('click', closeModal);
      $('#modal').addEventListener('click', (e)=>{ if(e.target.id==='modal') closeModal(); });

      // add book
      $('#addForm').addEventListener('submit', (e)=>{
        e.preventDefault();
        const title = $('#bTitle').value.trim();
        if(!title) return alert('Title required');
        const newBook = {
          id: Date.now(),
          title,
          author: $('#bAuthor').value.trim() || 'Unknown',
          category: $('#bCategory').value.trim() || 'Uncategorized',
          cover: 'https://picsum.photos/seed/' + encodeURIComponent(title) + '/200/300',
          url: $('#bURL').value.trim() || '#',
          desc: ''
        };
        state.books.unshift(newBook);
        // refresh categories UI (simple approach)
        location.reload(); // quick hack: reload to simplify UI rebuild
      });

      // import (accept JSON file of books)
      $('#importBtn').addEventListener('click', ()=>{
        const input = document.createElement('input'); input.type='file'; input.accept='application/json';
        input.onchange = e => {
          const f = e.target.files[0]; if(!f) return;
          const r = new FileReader();
          r.onload = ()=>{
            try {
              const arr = JSON.parse(r.result);
              if(Array.isArray(arr)){
                arr.forEach(a=> a.id = a.id || Date.now()+Math.floor(Math.random()*1000));
                state.books = arr.concat(state.books);
                location.reload();
              } else alert('JSON must be an array of book objects');
            } catch(err){ alert('Invalid JSON'); }
          };
          r.readAsText(f);
        };
        input.click();
      });

      render();
    }

    // Auto init
    init();

    // ====== Notes for maintainers ======
    /*
      How to use this file locally:
      1. Save as online-library.html and open in any modern browser.
      2. Replace the BOOKS array with your own JSON records. Each book object may contain:
         { id, title, author, category, cover, url, desc }
      3. Use the Import button to upload a JSON file with an array of book objects.
      4. To host online: upload this file and any assets to your web host.

      Caveats:
      - Some remote sites block embedding via iframe (X-Frame-Options). For those, clicking "Open" will open the page in a new tab.
      - This demo does not include user accounts, DRM, nor a server backend. For production you'll want a server and a database.
    */
  </script>
</body>
</html>
